name: Standard Ansible Workflow

on:
  workflow_call:
    inputs:
      ansible_playbook:
        required: true
        type: string
        description: ansible playbook to be executed
      ansible_additional_parameters:
        type: string
        description: Additional Parameters to Ansible command
      ansible_verbose_logging:
        type: string
        description: Ansible Verbose Logging Enabled
        default: 'false'
        required: false
      runs-on:
        type: string
        description: Site used for job execution on non multisite jobs
        default: 'london'
      checkout_vault:
        type: string
        description: Checkout ansible-vault repository
        default: 'true'
        required: false
      checkout_inventory:
        type: string
        description: Checkout ansible-inventory repository
        default: 'false'
        required: false
      checkout_roles:
        type: string
        description: Checkout ansible-inventory repository
        default: 'true'
        required: false
      azure_login:
        type: string
        description: Azure Login Required
        default: 'false'
        required: false
    secrets:
      gh_pat_token:
      bw_access_token:
      bw_organization_id:
      arm_client_id:
        required: false
      arm_client_secret:
        required: false
      arm_tenant_id:
        required: false
jobs:
  ansible:
    runs-on: "${{ inputs.runs-on }}"
    defaults:
      run:
        working-directory: "${{ github.workspace }}/core-config"
    env:
      verbose_logs: ""
    steps:
      - name: Checkout Repository (${{ github.event.repository.name }})
        uses: actions/checkout@v7
        with:
          path: "${{ github.event.repository.name }}"

      - name: Checkout Repository (core-config)
        uses: actions/checkout@v7
        with:
          path: ansible-core
          token: ${{secrets.gh_pat_token}}
          ref: 'main'
          repository: 'epichouse/core-config'
        if: ${{ github.event.repository.name != 'core-config' }}

      - name: Checkout Repository (ansible-roles)
        uses: actions/checkout@v7
        with:
          path: ansible-roles
          token: ${{secrets.gh_pat_token}}
          ref: 'main'
          repository: 'epichouse/ansible-roles'
        if: ${{ inputs.checkout_roles == 'true' }}

      - name: Azure Login
        run: |
          az login \
          --service-principal \
          -t ${{ secrets.ARM_TENANT_ID }} \
          -u ${{secrets.ARM_CLIENT_ID}} \
          -p ${{ secrets.ARM_CLIENT_SECRET }} \
        if: ${{ inputs.azure_login == 'true' }}

      - name: Enable Verbose Flag
        run: |
          echo "verbose_logs=-vvv" >> $GITHUB_ENV
        if: ${{ inputs.ansible_verbose_logging  == 'true' }}

      - name: Output Ansible Inventory
        run: |
          ansible-inventory --graph

      - name: Run Playbook
        run: |
          ansible-playbook ${{ github.workspace }}/${{ github.event.repository.name }}/${{ inputs.ansible_playbook }} \
          ${{ inputs.ansible_additional_parameters }} \
          ${{ env.verbose_logs}} \

      - name: Cleanup Vault Password File
        run: rm ~/.vault
        if: always()