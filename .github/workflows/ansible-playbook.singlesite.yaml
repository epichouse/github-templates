on:
    workflow_call:
      inputs:
        ansible_playbook:
          required: true
          type: string
          description: ansible playbook to be executed
        site:
          required: true
          type: string
          description: site to execute against
        ansible_additional_parameters:
          type: string
          description: Additional Parameters to Ansible command
        ansible_verbose_logging:
          type: string
          default: 'false'
          description: Enable or disable verbose logging
          required: false
      secrets:
        gh_pat_token:
        arm_client_id:
        arm_client_secret:
        arm_tenant_id:
        bw_access_token:
        bw_organization_id:
jobs:
  london:
    runs-on: "${{ inputs.site }}"
    name: "${{ inputs.ansible_playbook }}"
    defaults:
      run:
        working-directory: "${{ github.event.repository.name }}"
    env:
      verbose_logs: ""
      BW_ACCESS_TOKEN: ${{ secrets.bw_access_token }}
      BW_ORGANIZATION_ID: ${{ secrets.bw_organization_id }}
    steps:
      - name: Checkout Repository (${{ github.event.repository.name }})
        uses: actions/checkout@v4
        with:
          path: "${{ github.event.repository.name }}"
      - name: Checkout Repository (ansible-core)
        uses: actions/checkout@v4
        with:
          path: ansible-core
          token: ${{secrets.gh_pat_token}}
          ref: 'main'
          repository: 'epichouse/ansible-core'
        if: ${{ github.event.repository.name != 'ansible-core' }}
      - name: Checkout Repository (ansible-roles)
        uses: actions/checkout@v4
        with:
          path: ansible-roles
          token: ${{secrets.gh_pat_token}}
          ref: 'main'
          repository: 'epichouse/ansible-roles'
      - name: Set Verbosity
        run: echo "verbose_logs=-vvv" >> $GITHUB_ENV
        if: ${{ inputs.ansible_verbose_logging  == 'true' }}
      - name: Run Playbook
        run: ansible-playbook ${{ inputs.ansible_playbook }} ${{ inputs.ansible_additional_parameters }} ${{ env.verbose_logs}}
